<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bond Tracker — Insurance Agency of Mid America</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1b2a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
        }
        .card-header {
            background: #0d1b2a;
            padding: 28px 32px;
            text-align: center;
        }
        .logo {
            width: 52px; height: 52px;
            background: #0288d1;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800; color: white;
            margin: 0 auto 14px;
        }
        .app-name { color: white; font-size: 20px; font-weight: 700; }
        .app-sub  { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 4px; }

        .card-body { padding: 32px; }
        .sign-in-label {
            font-size: 15px; font-weight: 600; color: #0d1b2a;
            margin-bottom: 22px; text-align: center;
        }

        .form-grp { margin-bottom: 16px; }
        .form-lbl {
            display: block; font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.7px;
            color: #5f6368; margin-bottom: 6px;
        }
        .form-ctrl {
            width: 100%; padding: 10px 13px;
            border: 1px solid #dadce0; border-radius: 4px;
            font-size: 14px; color: #3c4043;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        .form-ctrl:focus {
            border-color: #1565c0;
            box-shadow: 0 0 0 3px rgba(21,101,192,0.12);
        }

        .error-msg {
            background: #ffebee; color: #c62828;
            border: 1px solid #ef9a9a; border-radius: 4px;
            padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
        }

        .btn-login {
            width: 100%; padding: 11px;
            background: #1565c0; color: white;
            border: none; border-radius: 4px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; font-family: inherit;
            transition: background 0.15s;
        }
        .btn-login:hover { background: #1976d2; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .card-footer {
            padding: 14px 32px 20px;
            text-align: center;
            font-size: 12px; color: #9aa0a6;
            border-top: 1px solid #f1f3f4;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="logo">BT</div>
            <div class="app-name">Bond Tracker</div>
            <div class="app-sub">Insurance Agency of Mid America</div>
        </div>
        <div class="card-body">
            <div class="sign-in-label">Sign in to your account</div>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <div id="jsError" class="error-msg" style="display:none;"></div>

            <form id="loginForm">
                <div class="form-grp">
                    <label class="form-lbl" for="username">Username</label>
                    <input type="text" class="form-ctrl" id="username" name="username"
                           placeholder="Enter your username" autocomplete="username" required autofocus>
                </div>
                <div class="form-grp">
                    <label class="form-lbl" for="password">Password</label>
                    <input type="password" class="form-ctrl" id="password" name="password"
                           placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login" id="submitBtn">Sign In</button>
            </form>
        </div>
        <div class="card-footer">
            Contact your administrator if you need access.
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const err = document.getElementById('jsError');
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        err.style.display = 'none';

        const resp = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
            })
        });

        const data = await resp.json();
        if (data.ok) {
            window.location.href = '/';
        } else {
            err.textContent = data.error || 'Login failed.';
            err.style.display = '';
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
    </script>
</body>
</html>
