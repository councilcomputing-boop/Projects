<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAMA BondDesk — Insurance Agency of Mid America</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1b2a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
        }
        .card-header {
            background: #0d1b2a;
            padding: 28px 32px;
            text-align: center;
        }
        .logo { display: flex; justify-content: center; margin: 0 auto 14px; }
        .app-name { color: white; font-size: 20px; font-weight: 700; }
        .app-sub  { color: rgba(255,255,255,0.55); font-size: 12px; margin-top: 4px; }

        .card-body { padding: 32px; }
        .sign-in-label {
            font-size: 15px; font-weight: 600; color: #0d1b2a;
            margin-bottom: 22px; text-align: center;
        }

        .form-grp { margin-bottom: 16px; }
        .form-lbl {
            display: block; font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.7px;
            color: #5f6368; margin-bottom: 6px;
        }
        .form-ctrl {
            width: 100%; padding: 10px 13px;
            border: 1px solid #dadce0; border-radius: 4px;
            font-size: 14px; color: #3c4043;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        .form-ctrl:focus {
            border-color: #1565c0;
            box-shadow: 0 0 0 3px rgba(21,101,192,0.12);
        }

        .error-msg {
            background: #ffebee; color: #c62828;
            border: 1px solid #ef9a9a; border-radius: 4px;
            padding: 10px 14px; font-size: 13px; margin-bottom: 16px;
        }

        .btn-login {
            width: 100%; padding: 11px;
            background: #1565c0; color: white;
            border: none; border-radius: 4px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; font-family: inherit;
            transition: background 0.15s;
        }
        .btn-login:hover { background: #1976d2; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .card-footer {
            padding: 14px 32px 20px;
            text-align: center;
            font-size: 12px; color: #9aa0a6;
            border-top: 1px solid #f1f3f4;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="logo">
                <svg width="54" height="60" viewBox="0 0 54 60" xmlns="http://www.w3.org/2000/svg">
                  <defs><clipPath id="scl"><path d="M27 2 L51 10 L51 34 Q51 49 27 58 Q3 49 3 34 L3 10 Z"/></clipPath></defs>
                  <path d="M27 2 L51 10 L51 34 Q51 49 27 58 Q3 49 3 34 L3 10 Z" fill="#1565c0"/>
                  <rect x="0" y="39" width="54" height="21" clip-path="url(#scl)" fill="#071524"/>
                  <rect x="5" y="28" width="7" height="12" clip-path="url(#scl)" fill="#071524"/>
                  <rect x="13" y="22" width="7" height="18" clip-path="url(#scl)" fill="#071524"/>
                  <rect x="21" y="26" width="6" height="14" clip-path="url(#scl)" fill="#071524"/>
                  <rect x="34" y="28" width="10" height="12" clip-path="url(#scl)" fill="#071524"/>
                  <rect x="30" y="14" width="3" height="26" clip-path="url(#scl)" fill="#071524"/>
                  <rect x="22" y="14" width="18" height="2" clip-path="url(#scl)" fill="#071524"/>
                  <line x1="39" y1="16" x2="39" y2="23" clip-path="url(#scl)" stroke="#071524" stroke-width="1.5"/>
                  <rect x="6.5" y="31" width="2" height="2" clip-path="url(#scl)" fill="#ffd54f" opacity="0.85"/>
                  <rect x="9.5" y="31" width="2" height="2" clip-path="url(#scl)" fill="#ffd54f" opacity="0.6"/>
                  <rect x="14" y="24" width="2" height="2" clip-path="url(#scl)" fill="#ffd54f" opacity="0.85"/>
                  <rect x="14" y="28" width="2" height="2" clip-path="url(#scl)" fill="#ffd54f" opacity="0.65"/>
                  <rect x="17" y="24" width="2" height="2" clip-path="url(#scl)" fill="#ffd54f" opacity="0.6"/>
                  <line x1="3" y1="39" x2="51" y2="39" clip-path="url(#scl)" stroke="#90caf9" stroke-width="1"/>
                  <path d="M27 2 L51 10 L51 34 Q51 49 27 58 Q3 49 3 34 L3 10 Z" fill="none" stroke="#4fc3f7" stroke-width="2"/>
                </svg>
            </div>
            <div class="app-name">IAMA BondDesk</div>
            <div class="app-sub">Insurance Agency of Mid America</div>
        </div>
        <div class="card-body">
            <div class="sign-in-label">Sign in to your account</div>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <div id="jsError" class="error-msg" style="display:none;"></div>

            <form id="loginForm">
                <div class="form-grp">
                    <label class="form-lbl" for="username">Username</label>
                    <input type="text" class="form-ctrl" id="username" name="username"
                           placeholder="Enter your username" autocomplete="username" required autofocus>
                </div>
                <div class="form-grp">
                    <label class="form-lbl" for="password">Password</label>
                    <input type="password" class="form-ctrl" id="password" name="password"
                           placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login" id="submitBtn">Sign In</button>
            </form>
        </div>
        <div class="card-footer">
            Contact your administrator if you need access.
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const err = document.getElementById('jsError');
        btn.disabled = true;
        btn.textContent = 'Signing in...';
        err.style.display = 'none';

        const resp = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
            })
        });

        const data = await resp.json();
        if (data.ok) {
            window.location.href = '/';
        } else {
            err.textContent = data.error || 'Login failed.';
            err.style.display = '';
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
    </script>
</body>
</html>
