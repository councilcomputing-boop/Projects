[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # STRIPE_SECRET_KEY and FIREBASE_SERVICE_ACCOUNT are read only at runtime
  # inside netlify/functions/verify-payment.js — never written to the publish
  # directory or the client bundle. Netlify's secrets scanner can't tell that
  # apart from a real leak, so it flags them; this tells it they're safe.
  SECRETS_SCAN_OMIT_KEYS = "STRIPE_SECRET_KEY,FIREBASE_SERVICE_ACCOUNT"

[functions]
  node_bundler = "esbuild"
